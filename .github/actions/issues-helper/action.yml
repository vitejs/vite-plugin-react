name: Issues Helper
description: Create comments, close stale issues by label, or lock inactive closed issues.
inputs:
  actions:
    required: true
    description: One of `create-comment`, `close-issues`, `lock-closed-issues`.
  token:
    required: true
    description: GitHub token.
  issue-number:
    required: false
    description: Issue number. Required for `create-comment`.
  labels:
    required: false
    description: Comma-separated label names. Required for `close-issues`.
  body:
    required: false
    description: Comment body. Required for `create-comment`.
  inactive-day:
    required: false
    description: Close or lock issues that have had no activity for this many days. Required for `close-issues` and `lock-closed-issues`.

runs:
  using: composite
  steps:
    - name: Create comment
      if: inputs.actions == 'create-comment'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        INPUT_BODY: ${{ inputs.body }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: Number(process.env.INPUT_ISSUE_NUMBER),
            body: process.env.INPUT_BODY,
          })

    - name: Close stale issues
      if: inputs.actions == 'close-issues'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_INACTIVE_DAY: ${{ inputs.inactive-day }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const labels = process.env.INPUT_LABELS
          const inactiveDay = Number(process.env.INPUT_INACTIVE_DAY)
          const cutoff = new Date(Date.now() - inactiveDay * 24 * 60 * 60 * 1000)
          const labelSet = new Set(labels.split(',').map(label => label.trim()).filter(Boolean))

          const issues = await github.paginate(github.rest.issues.listForRepo, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels,
            per_page: 100,
          })

          let closed = 0
          for (const issue of issues) {
            if (issue.pull_request) continue
            if (new Date(issue.updated_at) > cutoff) continue

            const events = await github.paginate(github.rest.issues.listEvents, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            })
            const labeledAt = events
              .filter(event => event.event === 'labeled' && labelSet.has(event.label?.name))
              .at(-1)?.created_at

            if (!labeledAt || new Date(labeledAt) > cutoff) continue

            console.log(`Closing #${issue.number}, labeled at ${labeledAt}, updated at ${issue.updated_at}`)
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
            })
            closed++
          }

          if (closed === 0) {
            console.log(`No stale items with label "${labels}" found`)
          }

    - name: Lock inactive closed issues
      if: inputs.actions == 'lock-closed-issues'
      # Mirrors the issue-only behavior previously used from:
      # https://github.com/dessant/lock-threads/blob/7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7/src/index.js
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        INPUT_INACTIVE_DAY: ${{ inputs.inactive-day }}
      with:
        github-token: ${{ inputs.token }}
        script: |
          const inactiveDay = Number(process.env.INPUT_INACTIVE_DAY)
          const cutoff = new Date(Date.now() - inactiveDay * 24 * 60 * 60 * 1000)
          const cutoffTimestamp = cutoff.toISOString().split('.')[0] + 'Z'
          const query = `repo:${context.repo.owner}/${context.repo.repo} updated:<${cutoffTimestamp} is:closed is:unlocked is:issue`

          const { data } = await github.rest.search.issuesAndPullRequests({
            q: query,
            sort: 'updated',
            order: 'desc',
            per_page: 50,
          })
          const issues = data.items.filter(issue => !issue.locked)

          let locked = 0
          for (const issue of issues) {
            console.log(`Locking #${issue.number}, updated at ${issue.updated_at}`)
            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            })
            locked++
          }

          if (locked === 0) {
            console.log(`No inactive closed issues found`)
          }
